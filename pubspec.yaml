name: gallerio
description: "A beautiful gallery with a hidden vault."
publish_to: 'none'
version: 1.0.9+9

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Database
  sqflite: ^2.4.2

  # Gallery access
  photo_manager: ^3.6.4
  photo_manager_image_provider: ^2.2.0

  # PIN hashing (pure Dart PBKDF2)
  crypto: ^3.0.7

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Biometric auth
  local_auth: ^2.3.0

  # File paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # File picker
  file_picker: ^10.1.9

  # Permissions
  permission_handler: ^11.3.1

  # Share
  share_plus: ^10.1.4

  # Animations
  shimmer: ^3.0.0

  # Image conversion
  flutter_image_compress: ^2.4.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  riverpod_annotation: ^2.6.1
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
